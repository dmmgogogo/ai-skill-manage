name: AISkillManager
options:
  bundleIdPrefix: com.mmx
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.2"
    CURRENT_PROJECT_VERSION: "1"

packages:
  Yams:
    url: https://github.com/jpsim/Yams.git
    from: "5.0.0"

targets:
  AISkillManager:
    type: application
    platform: macOS
    sources:
      - path: AISkillManager
    dependencies:
      - package: Yams
    settings:
      base:
        PRODUCT_NAME: Triskill
        PRODUCT_MODULE_NAME: AISkillManager
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSMinimumSystemVersion: "14.0"
        INFOPLIST_KEY_CFBundleDisplayName: "Triskill"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        PRODUCT_BUNDLE_IDENTIFIER: com.mmx.AISkillManager
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES

  AISkillManagerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AISkillManagerTests
        excludes:
          - "Fixtures"
      - path: AISkillManagerTests/Fixtures/dir-source
        type: folder
      - path: AISkillManagerTests/Fixtures/cursor-rules
        type: folder
      - path: AISkillManagerTests/Fixtures/agents-md
        type: folder
    dependencies:
      - target: AISkillManager
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Triskill.app/Contents/MacOS/Triskill"
